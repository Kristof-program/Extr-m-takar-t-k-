<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini oldal</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    padding: 40px;
}

/* gomb */
button {
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
}

/* háttér (elsötétítés) */
.modal-bg {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* felugró ablak */
.modal {
    background: white;
    width: 300px;
    margin: 15% auto;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* bezárás gomb */
.close {
    margin-top: 10px;
    background: red;
    color: white;
    border: none;
}
</style>

</head>

<body>

<h1>Weboldal teszt</h1>

<button onclick="openModal()">Kattints ide</button>

<!-- POPUP -->
<div id="modalBg" class="modal-bg">
    <div class="modal">
        <h2>Ez egy felugró ablak</h2>
        <p>Itt lehet szöveg, kép, ár, bármi.</p>

        <button class="close" onclick="closeModal()">Bezárás</button>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("modalBg").style.display = "block";
}

function closeModal() {
    document.getElementById("modalBg").style.display = "none";
}
</script>

</body>
</html>
